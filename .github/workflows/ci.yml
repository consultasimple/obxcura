name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4"]
    env:
      # Pin to a real release asset — confirm the tag + filename on the
      # h4ckf0r0day/obscura releases page before first green build.
      OBSCURA_VERSION: "v0.1.9"
      OBSCURA_ASSET: "obscura-x86_64-linux.tar.gz"
      OBSCURA_BIN: "${{ github.workspace }}/.obscura/obscura"
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Install Obscura
        run: |
          mkdir -p .obscura
          curl -sSL -o obscura.tar.gz \
            "https://github.com/h4ckf0r0day/obscura/releases/download/${OBSCURA_VERSION}/${OBSCURA_ASSET}"
          tar -xzf obscura.tar.gz -C .obscura
          chmod +x "${OBSCURA_BIN}"
          "${OBSCURA_BIN}" --version

      - name: Lint
        run: bundle exec rubocop

      - name: Test
        run: bundle exec rspec
